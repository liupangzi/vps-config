server {
    server_name 404.liuchao.me;

    root /var/www/liuchao.me/404;
    index index.html;

    access_log /var/log/nginx/404_liuchao_me.access.log main;
    error_log  /var/log/nginx/404_liuchao_me.error.log warn;
    error_page 404 http://404.liuchao.me/;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/liuchao.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/liuchao.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = 404.liuchao.me) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name 404.liuchao.me;
    return 404; # managed by Certbot


}